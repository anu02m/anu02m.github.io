<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificates | Anurag Sharma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg-primary: #0d0d0d;
      --bg-secondary: #141414;
      --text-primary: #e8e8e8;
      --text-muted: #888888;
      --accent: #f0a500;
      --accent-dim: rgba(240, 165, 0, 0.15);
      --font-main: 'Iosevka Charon Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-main);
      padding: 3rem 6%;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.88rem;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      transition: color 0.2s ease, border-color 0.2s ease;
      margin-bottom: 3rem;
    }

    .back-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .page-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .page-label {
      font-size: 0.88rem;
      color: var(--accent);
      margin-bottom: 2.5rem;
    }

    .certificates-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .cert-row {
      display: flex;
      justify-content: center;
    }

    .cert-card {
      background: var(--bg-secondary);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 2rem 2.5rem;
      width: 70%;
      display: flex;
      align-items: center;
      gap: 2rem;
      transition: border-color 0.25s ease;
    }

    .cert-card:hover {
      border-color: rgba(240, 165, 0, 0.3);
    }

    .cert-icon {
      font-size: 2.2rem;
      min-width: 48px;
      text-align: center;
    }

    .cert-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .cert-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .cert-issuer {
      font-size: 0.85rem;
      color: var(--accent);
    }

    .cert-date {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    .cert-actions {
      display: flex;
      gap: 0.8rem;
      flex-shrink: 0;
    }

    .btn {
      text-decoration: none;
      padding: 0.55rem 1.1rem;
      border-radius: 6px;
      font-family: var(--font-main);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #0d0d0d;
    }

    .btn-primary:hover { opacity: 0.85; }

    .btn-outline {
      border: 1px solid var(--text-muted);
      color: var(--text-muted);
      background: none;
    }

    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* image popup */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .popup-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .popup-content {
      position: relative;
      max-width: 85vw;
      max-height: 85vh;
      transform: scale(0.95);
      transition: transform 0.3s ease;
    }

    .popup-overlay.active .popup-content {
      transform: scale(1);
    }

    .popup-content img {
      max-width: 100%;
      max-height: 85vh;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .popup-close {
      position: absolute;
      top: -2.5rem;
      right: 0;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
      font-family: var(--font-main);
      transition: color 0.2s ease;
    }

    .popup-close:hover { color: var(--text-primary); }
  </style>
</head>
<body>

  <a href="index.html" class="back-btn">← Back to Portfolio</a>

  <p class="page-label">// credentials</p>
  <h1 class="page-title">All Certificates</h1>

  <div class="certificates-list">

    <div class="cert-row">
      <div class="cert-card">
        <div class="cert-icon">☁</div>
        <div class="cert-info">
          <h3 class="cert-title">Cloud Computing</h3>
          <p class="cert-issuer">NPTEL</p>
          <p class="cert-date">Jan – Apr 2025</p>
        </div>
        <div class="cert-actions">
          <button class="btn btn-primary" onclick="openPopup('assets/certificates/cloud-computing.jpg')">View Certificate</button>
          <a href="https://drive.google.com/file/d/178_HxwBI8ivdVUSwbC1b_G8BQ_KV3dR-/view" target="_blank" class="btn btn-outline">Verify ↗</a>
        </div>
      </div>
    </div>

    <div class="cert-row">
      <div class="cert-card">
        <div class="cert-icon">🌐</div>
        <div class="cert-info">
          <h3 class="cert-title">Bits and Bytes of Computer Networking</h3>
          <p class="cert-issuer">Coursera — Google</p>
          <p class="cert-date">Aug – Sep 2024</p>
        </div>
        <div class="cert-actions">
          <button class="btn btn-primary" onclick="openPopup('assets/certificates/networking.jpg')">View Certificate</button>
          <a href="https://coursera.org/share/045fdffebdfd721c19260e752eca8408" target="_blank" class="btn btn-outline">Verify ↗</a>
        </div>
      </div>
    </div>

    <div class="cert-row">
      <div class="cert-card">
        <div class="cert-icon">✦</div>
        <div class="cert-info">
          <h3 class="cert-title">Responsive Web Design</h3>
          <p class="cert-issuer">FreeCodeCamp</p>
          <p class="cert-date">Aug – Oct 2023</p>
        </div>
        <div class="cert-actions">
          <button class="btn btn-primary" onclick="openPopup('assets/certificates/web-design.jpg')">View Certificate</button>
          <a href="https://freecodecamp.org/certification/anu02m/responsive-web-design" target="_blank" class="btn btn-outline">Verify ↗</a>
        </div>
      </div>
    </div>

  </div>

  <!-- popup -->
  <div class="popup-overlay" id="cert-popup">
    <div class="popup-content">
      <button class="popup-close" onclick="closePopup()">✕ close</button>
      <img id="popup-img" src="" alt="Certificate" />
    </div>
  </div>

  <script>
    function openPopup(src) {
      document.getElementById('popup-img').src = src;
      document.getElementById('cert-popup').classList.add('active');
    }

    function closePopup() {
      document.getElementById('cert-popup').classList.remove('active');
    }

    document.getElementById('cert-popup').addEventListener('click', e => {
      if (e.target === e.currentTarget) closePopup();
    });
  </script>

</body>
</html>
